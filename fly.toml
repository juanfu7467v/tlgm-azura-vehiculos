# fly.toml app configuration file generated for vehiculos-pe on 2026-03-26T23:18:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vehiculos-pe'
primary_region = 'iad'
kill_signal = 'SIGINT'
kill_timeout = '30s'

[build]

[env]
  PORT = '8080'
  PYTHONUNBUFFERED = '1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 20
    hard_limit = 25

  [[http_service.checks]]
    grace_period = '20s'
    interval = '30s'
    method = 'GET'
    timeout = '10s'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
