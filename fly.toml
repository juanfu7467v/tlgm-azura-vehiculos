# fly.toml app configuration file generated for vehiculos-pe on 2026-03-23T15:18:15Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vehiculos-pe'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  # CRÍTICO: permite que Fly.io espere a que Flask inicie antes de verificar
  [[http_service.checks]]
    grace_period = "15s"   # Tiempo de espera antes del primer chequeo
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512   # Aumentado de 256 a 512 para estabilidad con Telethon
